<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Feed de episodios · Reproductor dinámico</title>
  <!-- Cargamos el reproductor (asegúrate de que la ruta sea correcta) -->
  <script src="reproductor.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0b0f12;
      color: #eee;
      font-family: 'Spline Sans', sans-serif;
      padding-bottom: 100px; /* espacio para el miniplayer */
    }
    .feed-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #a0e0ff, #6cb2eb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: #aaa;
      margin-bottom: 2rem;
      font-size: 1rem;
    }
    .episode-card {
      display: flex;
      gap: 16px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }
    .episode-card:hover {
      transform: scale(1.02);
      background: rgba(255,255,255,0.1);
    }
    .episode-cover {
      width: 100px;
      height: 100px;
      border-radius: 16px;
      object-fit: cover;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }
    .episode-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .episode-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: #fff;
    }
    .episode-artist {
      color: #b0b0b0;
      font-size: 0.95rem;
      margin-bottom: 8px;
    }
    .episode-meta {
      display: flex;
      gap: 12px;
      font-size: 0.85rem;
      color: #888;
    }
    .episode-badge {
      background: rgba(255,255,255,0.1);
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
      color: #ccc;
      align-self: flex-start;
    }
    .footer-note {
      text-align: center;
      color: #555;
      margin-top: 40px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="feed-container">
    <h1>🎙️ Podcast Lab</h1>
    <div class="subtitle">Selecciona un episodio para escucharlo. El reproductor se adaptará a su color.</div>

    <!-- Las tarjetas se generan dinámicamente con JS para mantener los datos centralizados -->
    <div id="episode-list"></div>
    <div class="footer-note">⚡ Los colores de fondo cambiarán según el episodio.</div>
  </div>

  <script>
    // Lista completa de episodios (con todos los campos)
    const episodios = [
      {
        id: 'ep1',
        title: 'El futuro de la IA generativa',
        artist: 'Tecnología con Ana',
        cover: 'https://picsum.photos/id/1/400/400',
        audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
        video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4',
        transcript: 'En este episodio exploramos cómo la inteligencia artificial generativa está transformando el arte, la música y la comunicación. Hablamos con expertos en ética y creatividad.',
        serie: 'Futuro Tech',
        color: '#3b82f6' // azul
      },
      {
        id: 'ep2',
        title: 'Sonidos del alma: entrevista con Julieta',
        artist: 'Música y Letras',
        cover: 'https://picsum.photos/id/1043/400/400',
        audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3',
        video: '', // sin video
        transcript: 'Julieta nos abre su corazón y nos habla de su proceso creativo, la influencia de la poesía en sus canciones y sus próximos proyectos.',
        serie: 'Entrevistas íntimas',
        color: '#ec4899' // rosa
      },
      {
        id: 'ep3',
        title: 'Cambio climático: soluciones reales',
        artist: 'Planeta Futuro',
        cover: 'https://picsum.photos/id/1044/400/400',
        audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3',
        video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4',
        transcript: 'Analizamos las propuestas más innovadoras para frenar el calentamiento global, desde energías renovables hasta reforestación masiva. Invitados: científicos de renombre.',
        serie: 'Ciencia',
        color: '#10b981' // verde
      },
      {
        id: 'ep4',
        title: 'Narrativas sonoras: el arte del podcast',
        artist: 'Radio Ambulante',
        cover: 'https://picsum.photos/id/20/400/400',
        audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3',
        video: '',
        transcript: 'Descubre cómo se construye un podcast de calidad: guion, edición, sonido ambiente. Consejos de los mejores productores.',
        serie: 'Detrás del micrófono',
        color: '#f59e0b' // ámbar
      },
      {
        id: 'ep5',
        title: 'Filosofía en 10 minutos: Estoicismo',
        artist: 'Mente Abierta',
        cover: 'https://picsum.photos/id/1015/400/400',
        audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3',
        video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4',
        transcript: 'Resumen práctico de las enseñanzas de Epicteto, Séneca y Marco Aurelio para aplicar en la vida diaria.',
        serie: 'Filosofía',
        color: '#8b5cf6' // violeta
      }
    ];

    // Renderizar tarjetas en el feed
    const container = document.getElementById('episode-list');
    episodios.forEach((ep, index) => {
      const card = document.createElement('div');
      card.className = 'episode-card';
      card.setAttribute('data-index', index);
      card.innerHTML = `
        <img src="${ep.cover}" class="episode-cover" alt="cover">
        <div class="episode-info">
          <div class="episode-title">${ep.title}</div>
          <div class="episode-artist">${ep.artist} · ${ep.serie}</div>
          <div class="episode-meta">
            <span>⏱️ ${ep.duration ? Math.floor(ep.duration/60) + ' min' : '~5 min'}</span>
            <span>🎥 ${ep.video ? 'Video' : 'Solo audio'}</span>
          </div>
          <span class="episode-badge" style="background: ${ep.color}30; color: ${ep.color};">● ${ep.color}</span>
        </div>
      `;
      card.addEventListener('click', () => {
        // Cargar TODOS los episodios en el reproductor (para que la lista funcione)
        // y empezar por el índice seleccionado.
        if (window.playerAPI) {
          window.playerAPI.load(episodios, index);
          // Opcional: expandir automáticamente
          window.playerAPI.expand();
        } else {
          alert('El reproductor aún no está listo, espera un momento.');
        }
      });
      container.appendChild(card);
    });

    // Si el reproductor ya está listo, se puede cargar el primer episodio por defecto
    // pero lo dejamos para que el usuario elija.
  </script>
</body>
</html>
